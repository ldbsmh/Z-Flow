name: Build Z-Flow

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.txt'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

  workflow_dispatch:

jobs:
  build:
    name: Build APK (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ==================== Debug 构建（严格模式）====================
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ==================== Release 构建（关闭 lintVital）====================
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace -x lintVitalRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Flow-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Flow-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
